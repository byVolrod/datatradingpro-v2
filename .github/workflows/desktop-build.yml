name: Build Desktop Installer

# Build l'app bureau Electron (Windows + macOS) sur des runners GitHub propres
# (evite le blocage "privilege symlink" du build local Windows) et publie les
# installeurs dans une GitHub Release. Declenche par un tag v* (ou manuellement).
#
# Apres un build, les binaires sont : DataTradingPro-Setup.exe (Windows),
# DataTradingPro-mac-arm64.zip (Apple Silicon), DataTradingPro-mac-x64.zip (Intel).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # necessaire pour creer la Release

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: "--win nsis --x64"
          - os: macos-latest
            args: "--mac --arm64 --x64"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Build installer
        run: npx electron-builder ${{ matrix.args }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # build NON signe (pas de certificat requis)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            desktop/dist/*.exe
            desktop/dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
