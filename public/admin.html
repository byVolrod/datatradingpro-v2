<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — DataTradingPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0a0a0a; --bg2: #111; --bg3: #191919; --bg4: #1e1e1e;
      --border: #1e1e1e; --border2: #2a2a2a;
      --text:  #e8e8e8; --text2: #aaa; --text3: #666; --text4: #444;
      --orange: #f7941d; --orange-bg: rgba(247,148,29,0.1);
      --red: #e74c3c;  --green: #2ecc71;
      --font-ui: 'Inter', sans-serif; --font-mono: 'JetBrains Mono', monospace;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); font-size: 13px; }

    /* ── Topbar ── */
    .topbar {
      height: 44px; background: var(--bg2); border-bottom: 1px solid var(--border2);
      display: flex; align-items: center; gap: 12px; padding: 0 20px; flex-shrink: 0;
    }
    .topbar-logo { font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: var(--orange); }
    .topbar-title { font-size: 12px; color: var(--text3); }
    .topbar-spacer { flex: 1; }
    .topbar-user { font-size: 11px; color: var(--text2); font-family: var(--font-mono); }
    .btn-sm {
      padding: 5px 12px; font-size: 11px; font-weight: 600; cursor: pointer; border-radius: 3px;
      border: 1px solid var(--border2); background: var(--bg3); color: var(--text2);
      font-family: var(--font-mono); transition: color 0.12s, border-color 0.12s;
    }
    .btn-sm:hover { color: var(--text); border-color: var(--border2); background: var(--bg4); }
    .btn-primary { background: var(--orange); color: #000; border-color: var(--orange); }
    .btn-primary:hover { opacity: 0.88; color: #000; }
    .btn-danger  { border-color: rgba(231,76,60,0.4); color: #ef4444; }
    .btn-danger:hover { background: rgba(231,76,60,0.1); border-color: rgba(231,76,60,0.6); }
    .btn-back { color: var(--text3); }
    .btn-back:hover { color: var(--text); }

    /* ── Layout ── */
    .page { max-width: 900px; margin: 0 auto; padding: 28px 20px; }
    .section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text3); margin-bottom: 14px; margin-top: 28px;
    }
    .section-title:first-child { margin-top: 0; }

    /* ── Add user form ── */
    .add-form {
      background: var(--bg2); border: 1px solid var(--border2); border-radius: 6px;
      padding: 18px 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end;
    }
    .add-form .form-field { display: flex; flex-direction: column; gap: 5px; min-width: 140px; }
    .add-form label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
    .add-form input, .add-form select {
      background: var(--bg3); border: 1px solid var(--border2); border-radius: 3px;
      padding: 7px 10px; font-family: var(--font-mono); font-size: 12px; color: var(--text);
      outline: none; transition: border-color 0.12s;
    }
    .add-form input:focus, .add-form select:focus { border-color: var(--orange); }
    .add-form input::placeholder { color: var(--text4); }

    /* ── Error / success ── */
    .alert {
      padding: 8px 12px; border-radius: 4px; font-size: 12px; margin-bottom: 14px; display: none;
    }
    .alert.visible { display: block; }
    .alert-error   { background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); color: #ef4444; }
    .alert-success { background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.3); color: var(--green); }

    /* ── Users table ── */
    .users-table { width: 100%; border-collapse: collapse; }
    .users-table th {
      font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase;
      letter-spacing: 0.06em; text-align: left; padding: 7px 10px 7px;
      border-bottom: 1px solid var(--border2);
    }
    .users-table td {
      padding: 9px 10px; border-bottom: 1px solid var(--border);
      font-size: 12px; color: var(--text2);
    }
    .users-table tr:last-child td { border-bottom: none; }
    .users-table tr:hover td { background: rgba(255,255,255,0.02); }
    .users-table .email { color: var(--text); font-family: var(--font-mono); }
    .users-table .name  { color: var(--text2); }
    .users-table .actions { display: flex; gap: 6px; }

    .badge {
      display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 10px; font-weight: 600;
      font-family: var(--font-mono); letter-spacing: 0.04em;
    }
    .badge-admin   { background: rgba(247,148,29,0.12); color: var(--orange); border: 1px solid rgba(247,148,29,0.3); }
    .badge-client  { background: rgba(255,255,255,0.05); color: var(--text3); border: 1px solid var(--border2); }
    .badge-active  { background: rgba(46,204,113,0.1); color: var(--green); border: 1px solid rgba(46,204,113,0.25); }
    .badge-suspended { background: rgba(231,76,60,0.1); color: #ef4444; border: 1px solid rgba(231,76,60,0.25); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; display: none;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border2); border-radius: 6px;
      padding: 24px; width: 360px; box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }
    .modal-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
    .modal .form-field { margin-bottom: 14px; }
    .modal label { display: block; font-size: 10px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px; font-weight: 600; }
    .modal input, .modal select {
      width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 3px;
      padding: 8px 10px; font-family: var(--font-mono); font-size: 12px; color: var(--text);
      outline: none; transition: border-color 0.12s;
    }
    .modal input:focus, .modal select:focus { border-color: var(--orange); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    .table-wrap { background: var(--bg2); border: 1px solid var(--border2); border-radius: 6px; overflow: hidden; }
    .empty-state { padding: 32px; text-align: center; color: var(--text3); font-size: 12px; }
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">DTP</span>
  <span class="topbar-title">/ Admin — Gestion des utilisateurs</span>
  <div class="topbar-spacer"></div>
  <span class="topbar-user" id="admin-name"></span>
  <button class="btn-sm btn-back" onclick="window.location.href='/'">← Dashboard</button>
  <button class="btn-sm" onclick="logout()">Déconnexion</button>
</div>

<div class="page">

  <!-- Add user -->
  <div class="section-title">Ajouter un utilisateur</div>
  <div class="alert alert-error"   id="add-error"></div>
  <div class="alert alert-success" id="add-success"></div>
  <form class="add-form" id="add-form">
    <div class="form-field">
      <label>Nom</label>
      <input type="text" name="name" placeholder="Prénom Nom" />
    </div>
    <div class="form-field">
      <label>Email</label>
      <input type="email" name="email" placeholder="client@email.com" required />
    </div>
    <div class="form-field">
      <label>Mot de passe</label>
      <input type="password" name="password" placeholder="••••••••" required minlength="6" />
    </div>
    <div class="form-field">
      <label>Rôle</label>
      <select name="role">
        <option value="client">Client</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="form-field">
      <label>Plan</label>
      <select name="plan">
        <option value="professionnel">Professionnel</option>
      </select>
    </div>
    <div class="form-field">
      <label>Durée d'abonnement</label>
      <select name="duration" id="add-duration" onchange="toggleCustom('add')">
        <option value="1">1 mois</option>
        <option value="3">3 mois</option>
        <option value="6">6 mois</option>
        <option value="12">12 mois</option>
        <option value="unlimited">Illimité</option>
        <option value="custom">Date personnalisée…</option>
      </select>
    </div>
    <div class="form-field" id="add-custom-wrap" style="display:none">
      <label>Date d'expiration</label>
      <input type="date" name="expiresAt" id="add-custom-date" />
    </div>
    <button type="submit" class="btn-sm btn-primary">+ Ajouter</button>
  </form>

  <!-- Users list -->
  <div class="section-title" style="margin-top:32px">Utilisateurs (<span id="user-count">—</span>)</div>
  <div class="table-wrap">
    <table class="users-table" id="users-table">
      <thead>
        <tr>
          <th>Nom</th>
          <th>Email</th>
          <th>Rôle</th>
          <th>Plan</th>
          <th>Statut</th>
          <th>Abonnement</th>
          <th>Dernière connexion</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="users-tbody">
        <tr><td colspan="8" class="empty-state">Chargement…</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- Edit modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">Modifier l'utilisateur</div>
    <input type="hidden" id="edit-id" />
    <div class="form-field">
      <label>Nom</label>
      <input type="text" id="edit-name" />
    </div>
    <div class="form-field">
      <label>Rôle</label>
      <select id="edit-role">
        <option value="client">Client</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="form-field">
      <label>Plan</label>
      <select id="edit-plan">
        <option value="professionnel">Professionnel</option>
      </select>
    </div>
    <div class="form-field">
      <label>Statut</label>
      <select id="edit-active">
        <option value="1">Actif</option>
        <option value="0">Suspendu</option>
      </select>
    </div>
    <div class="form-field">
      <label>Abonnement</label>
      <select id="edit-duration" onchange="toggleCustom('edit')">
        <option value="">— Garder l'échéance actuelle —</option>
        <option value="1">Renouveler 1 mois (dès aujourd'hui)</option>
        <option value="3">Renouveler 3 mois</option>
        <option value="6">Renouveler 6 mois</option>
        <option value="12">Renouveler 12 mois</option>
        <option value="unlimited">Illimité</option>
        <option value="custom">Date personnalisée…</option>
      </select>
    </div>
    <div class="form-field" id="edit-custom-wrap" style="display:none">
      <label>Date d'expiration</label>
      <input type="date" id="edit-custom-date" />
    </div>
    <div class="modal-actions">
      <button class="btn-sm" onclick="closeEditModal()">Annuler</button>
      <button class="btn-sm btn-primary" onclick="saveEdit()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Password modal -->
<div class="modal-overlay" id="pwd-modal">
  <div class="modal">
    <div class="modal-title">Changer le mot de passe</div>
    <input type="hidden" id="pwd-id" />
    <div class="form-field">
      <label>Nouveau mot de passe</label>
      <input type="password" id="pwd-new" placeholder="••••••••" minlength="6" />
    </div>
    <div class="modal-actions">
      <button class="btn-sm" onclick="closePwdModal()">Annuler</button>
      <button class="btn-sm btn-primary" onclick="savePwd()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
  // ── Auth check ──────────────────────────────────────────────────────────────
  fetch('/api/auth/me').then(r => r.json()).then(d => {
    if (!d.loggedIn) { window.location.href = '/login'; return; }
    if (d.user.role !== 'admin') { window.location.href = '/'; return; }
    document.getElementById('admin-name').textContent = d.user.name || d.user.email;
    loadUsers();
  });

  // ── Load users ──────────────────────────────────────────────────────────────
  async function loadUsers() {
    const users = await fetch('/api/admin/users').then(r => r.json());
    document.getElementById('user-count').textContent = users.length;
    const tbody = document.getElementById('users-tbody');
    if (!users.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Aucun utilisateur</td></tr>';
      return;
    }
    tbody.innerHTML = users.map(u => `
      <tr data-id="${u.id}">
        <td class="name">${u.name || '—'}</td>
        <td class="email">${u.email}</td>
        <td><span class="badge badge-${u.role}">${u.role}</span></td>
        <td><span class="badge badge-client">Professionnel</span></td>
        <td><span class="badge ${u.active ? 'badge-active' : 'badge-suspended'}">${u.active ? 'Actif' : 'Suspendu'}</span></td>
        <td>${subInfo(u)}</td>
        <td style="color:var(--text3);font-family:var(--font-mono);font-size:11px">${u.last_login ? new Date(u.last_login).toLocaleString('fr-FR') : '—'}</td>
        <td class="actions">
          <button class="btn-sm" onclick="openEdit(${u.id},'${esc(u.name)}','${u.role}','${u.plan}',${u.active})">Modifier</button>
          <button class="btn-sm" onclick="openPwd(${u.id})">MDP</button>
          <button class="btn-sm btn-danger" onclick="deleteUser(${u.id},'${esc(u.email)}')">Suppr.</button>
        </td>
      </tr>`).join('');
  }

  // Affiche l'état de l'abonnement (illimité / actif jusqu'au… / expiré)
  function subInfo(u) {
    if (u.role === 'admin') return '<span class="badge badge-admin">∞ admin</span>';
    if (!u.expires_at)      return '<span class="badge badge-active">Illimité</span>';
    const end  = new Date(u.expires_at);
    const date = end.toLocaleDateString('fr-FR');
    const days = Math.ceil((end - new Date()) / 86400000);
    if (days < 0)  return `<span class="badge badge-suspended">Expiré le ${date}</span>`;
    if (days <= 7) return `<span class="badge badge-suspended" style="opacity:.85">Expire le ${date} (${days}j)</span>`;
    return `<span class="badge badge-active">Jusqu'au ${date}</span>`;
  }

  function esc(s) { return (s||'').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

  // Affiche/masque le champ date personnalisée (formulaire add ou edit)
  function toggleCustom(which) {
    const sel  = document.getElementById(which + '-duration');
    const wrap = document.getElementById(which + '-custom-wrap');
    wrap.style.display = sel.value === 'custom' ? '' : 'none';
  }

  // ── Add user ────────────────────────────────────────────────────────────────
  document.getElementById('add-form').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const body = Object.fromEntries(fd.entries());
    const errEl = document.getElementById('add-error');
    const okEl  = document.getElementById('add-success');
    errEl.classList.remove('visible'); okEl.classList.remove('visible');

    const r = await fetch('/api/admin/users', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    });
    const d = await r.json();
    if (d.ok) {
      e.target.reset();
      okEl.textContent = `Utilisateur ${body.email} créé avec succès.`;
      okEl.classList.add('visible');
      loadUsers();
    } else {
      errEl.textContent = d.error || 'Erreur lors de la création';
      errEl.classList.add('visible');
    }
  });

  // ── Delete ──────────────────────────────────────────────────────────────────
  async function deleteUser(id, email) {
    if (!confirm(`Supprimer ${email} ?`)) return;
    await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
    loadUsers();
  }

  // ── Edit modal ──────────────────────────────────────────────────────────────
  function openEdit(id, name, role, plan, active) {
    document.getElementById('edit-id').value = id;
    document.getElementById('edit-name').value = name;
    document.getElementById('edit-role').value = role;
    document.getElementById('edit-plan').value = plan;
    document.getElementById('edit-active').value = active;
    document.getElementById('edit-duration').value = '';      // par défaut : on garde l'échéance
    document.getElementById('edit-custom-date').value = '';
    document.getElementById('edit-custom-wrap').style.display = 'none';
    document.getElementById('edit-modal').classList.add('open');
  }
  function closeEditModal() { document.getElementById('edit-modal').classList.remove('open'); }
  async function saveEdit() {
    const id = document.getElementById('edit-id').value;
    const body = {
      name:   document.getElementById('edit-name').value,
      role:   document.getElementById('edit-role').value,
      plan:   document.getElementById('edit-plan').value,
      active: +document.getElementById('edit-active').value,
    };
    const dur = document.getElementById('edit-duration').value;
    if (dur) {                                  // l'admin a choisi de renouveler / changer l'échéance
      body.duration = dur;
      if (dur === 'custom') body.expiresAt = document.getElementById('edit-custom-date').value;
    }
    await fetch(`/api/admin/users/${id}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    closeEditModal(); loadUsers();
  }

  // ── Password modal ──────────────────────────────────────────────────────────
  function openPwd(id) {
    document.getElementById('pwd-id').value = id;
    document.getElementById('pwd-new').value = '';
    document.getElementById('pwd-modal').classList.add('open');
  }
  function closePwdModal() { document.getElementById('pwd-modal').classList.remove('open'); }
  async function savePwd() {
    const id  = document.getElementById('pwd-id').value;
    const pwd = document.getElementById('pwd-new').value;
    if (!pwd || pwd.length < 6) { alert('Min. 6 caractères'); return; }
    await fetch(`/api/admin/users/${id}/password`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });
    closePwdModal();
    alert('Mot de passe mis à jour.');
  }

  // ── Logout ──────────────────────────────────────────────────────────────────
  async function logout() {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login';
  }

  // Close modals on overlay click
  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
  });
</script>
</body>
</html>
