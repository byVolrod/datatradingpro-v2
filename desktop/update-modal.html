<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>DataTradingPro — Mise à jour</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: transparent; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased; user-select: none; cursor: default; }
  .card {
    height: 100vh; display: flex; flex-direction: column;
    background: #16171b; border: 1px solid #232429; border-radius: 12px; overflow: hidden;
    -webkit-app-region: drag;                 /* la carte déplace la fenêtre du modal */
  }
  .accent { height: 3px; flex: 0 0 auto;
    background: linear-gradient(100deg, #f0d27a, #cfa233 55%, #b8860b); }
  .body { flex: 1 1 auto; padding: 22px 24px 4px; }
  .head { display: flex; align-items: center; gap: 11px; margin-bottom: 12px; }
  .spark { width: 30px; height: 30px; border-radius: 9px; flex: 0 0 auto;
    background: radial-gradient(120% 120% at 30% 20%, #1d1e23, #101014);
    display: grid; place-items: center; box-shadow: inset 0 0 0 1px #2a2b31; }
  .title { font-size: 15.5px; font-weight: 700; letter-spacing: -0.01em; color: #f3c344; }
  .msg { font-size: 13.5px; line-height: 1.55; color: #e6e6ea; margin: 0 2px 8px; }
  .detail { font-size: 12.5px; line-height: 1.6; color: #9aa3b2; margin: 0 2px; }
  .actions { flex: 0 0 auto; display: flex; justify-content: flex-end; gap: 10px;
    padding: 16px 24px 20px; -webkit-app-region: no-drag; }
  button { font: inherit; font-size: 13.5px; font-weight: 600; cursor: pointer;
    padding: 9px 16px; border-radius: 8px; border: 1px solid transparent; transition: filter .12s, background .12s, border-color .12s; }
  .btn-ghost { background: transparent; color: #c8ccd4; border-color: #2c2d33; }
  .btn-ghost:hover { background: #1d1e23; color: #e6e6ea; }
  .btn-primary { background: #f3c344; color: #14100a; font-weight: 700; }
  .btn-primary:hover { filter: brightness(1.06); }
  .btn-primary:active, .btn-ghost:active { transform: translateY(0.5px); }
</style>
</head>
<body>
  <div class="card">
    <div class="accent"></div>
    <div class="body">
      <div class="head">
        <span class="spark">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2.2 13.7 9 20.5 11 13.7 13 12 19.8 10.3 13 3.5 11 10.3 9Z" fill="#f3c344"/>
          </svg>
        </span>
        <span class="title" id="t">Mise à jour disponible</span>
      </div>
      <p class="msg" id="m"></p>
      <p class="detail" id="d"></p>
    </div>
    <div class="actions">
      <button class="btn-ghost"   id="secondary" onclick="choose('secondary')">Plus tard</button>
      <button class="btn-primary" id="primary"   onclick="choose('primary')">Mettre à jour</button>
    </div>
  </div>
<script>
  let ipcRenderer = null;
  try { ipcRenderer = require('electron').ipcRenderer; } catch (_) {}   // null hors Electron (prévisualisation)
  const q = new URLSearchParams(location.search);
  const set = (id, v) => { const el = document.getElementById(id); if (v != null) el.textContent = v; };
  set('t', q.get('title'));
  set('m', q.get('message'));
  const dEl = document.getElementById('d');
  if (q.get('detail')) dEl.textContent = q.get('detail'); else dEl.style.display = 'none';
  set('primary', q.get('primary'));
  set('secondary', q.get('secondary'));
  function choose(which) { if (ipcRenderer) ipcRenderer.send('dtp-update-choice', which); }
  // Échap = « Plus tard »
  window.addEventListener('keydown', e => { if (e.key === 'Escape') choose('secondary'); if (e.key === 'Enter') choose('primary'); });
</script>
</body>
</html>
