# ─────────────────────────────────────────────────────────────────────
#  DataTradingPro — Container Manager / VPS Docker
#  Construit l'image (Chromium inclus) et lance le serveur en permanence.
# ─────────────────────────────────────────────────────────────────────
services:
  datatradingpro:
    build: .
    container_name: datatradingpro
    restart: unless-stopped          # redémarre tout seul (reboot NAS inclus)
    ports:
      - "3000:3000"                  # accès : http://IP-DU-NAS:3000
    env_file:
      - .env                         # tes secrets (Supabase, FJ, MFB, Anthropic…)
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    volumes:
      # Persistance : cookies Puppeteer + caches survivent aux redémarrages
      - ./data/chrome_fj:/app/.chrome_profile_fj
      - ./data/chrome_ff:/app/.chrome_profile_ff
      - ./data/chrome_myfxbook:/app/.chrome_profile_myfxbook
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
