<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DTP - Login</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2323232a'/%3E%3Ctext x='32' y='34' dominant-baseline='central' text-anchor='middle' font-family='Arial,Helvetica,sans-serif' font-weight='900' font-size='25' letter-spacing='-1.5' fill='%23ffffff'%3EDTP%3C/text%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --bg2:       #111111;
      --bg3:       #191919;
      --border2:   #2a2a2a;
      --text:      #e8e8e8;
      --text2:     #aaaaaa;
      --text3:     #666666;
      --orange:    #f7941d;
      --font-stack:  -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      --font-ui:   var(--font-stack);
      --font-mono: var(--font-stack);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-variant-numeric: tabular-nums;
    }

    /* ════════════════════════════════
       TWO-PANEL LAYOUT
    ════════════════════════════════ */
    .lp-layout {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── LEFT panel: 65% ── */
    .lp-left {
      flex: 0 0 65%;
      position: relative;
      overflow: hidden;
      background: #070d14;
      border-right: 1px solid rgba(247,148,29,0.32);
    }

    /* Scrolling columns mosaic */
    .lp-mosaic {
      position: absolute;
      inset: 0;
      overflow: hidden;
      display: flex;
      gap: 8px;
      padding: 8px;
      background: #070d14;
    }

    .lp-col { flex-shrink: 0; width: 195px; min-width: 195px; overflow: hidden; }

    .lp-col-inner { display: flex; flex-direction: column; }

    .lp-tile {
      flex-shrink: 0;
      width: 195px;
      height: 130px;
      perspective: 800px;
      margin-bottom: 8px;
    }

    .lp-tile-inner {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
      transform-style: preserve-3d;
    }

    .lp-tile img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(2.2px);
    }

    .lp-tile-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0.65;
    }

    /* Top / bottom gradient fades */
    .lp-fade-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(to bottom, #0a0a0a, rgba(10,10,10,0.95) 60%, transparent);
      z-index: 3;
      pointer-events: none;
    }
    .lp-fade-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(to top, #0a0a0a, rgba(10,10,10,0.95) 60%, transparent);
      z-index: 3;
      pointer-events: none;
    }

    @keyframes scroll-up {
      from { transform: translateY(0); }
      to   { transform: translateY(-50%); }
    }

    /* Centered card in left panel */
    .lp-left-card {
      position: absolute;
      z-index: 10;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.62);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(247,148,29,0.6);
      box-shadow: 0 0 30px -6px rgba(247,148,29,0.45), inset 0 0 24px -18px rgba(247,148,29,0.6);
      border-radius: 10px;
      padding: 24px 32px;
      max-width: 520px;
      width: calc(100% - 48px);
      text-align: center;
    }
    .lp-tagline-1 {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 8px;
    }
    .lp-tagline-1 strong { color: var(--orange); font-weight: 700; }
    .lp-tagline-2 {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      line-height: 1.5;
    }

    /* ── RIGHT panel: 35% ── */
    .lp-right {
      flex: 0 0 35%;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 40px;
      overflow-y: auto;
      border-left: 1px solid #1a1a1a;
    }

    .lp-title {
      font-size: clamp(32px, 3.8vw, 50px);
      font-weight: 700;
      color: #ffffff;
      font-family: var(--font-ui);
      line-height: 1.05;
      margin-bottom: 36px;
      letter-spacing: -0.02em;
    }

    /* ── Form ── */
    .lp-form-group {
      margin-bottom: 14px;
    }
    .lp-label {
      display: block;
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 5px;
      font-weight: 500;
    }

    /* Input wrapper for icon */
    .lp-input-wrap {
      position: relative;
    }
    .lp-input-icon {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: rgba(247,148,29,0.5);
      pointer-events: none;
      line-height: 1;
    }
    /* Eye icon is clickable */
    .lp-input-icon--eye {
      pointer-events: auto;
      cursor: pointer;
      color: var(--text3);
      right: 10px;
      font-size: 14px;
      user-select: none;
    }
    .lp-input-icon--eye:hover { color: var(--text2); }
    /* Both eye + key: key shifts left */
    .lp-input-icon--key-pw {
      right: 34px;
    }

    .lp-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 5px;
      padding: 11px 36px 11px 12px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .lp-input:focus { border-color: var(--orange); }
    .lp-input::placeholder { color: var(--text3); }

    /* Checkbox + forgot row */
    .lp-row-remember {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      margin-top: 4px;
    }
    .lp-checkbox-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--text2);
      cursor: pointer;
    }
    .lp-checkbox-label input[type="checkbox"] {
      accent-color: var(--orange);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }
    .lp-forgot {
      font-size: 11px;
      color: var(--orange);
      text-decoration: none;
    }
    .lp-forgot:hover { text-decoration: underline; }

    /* Error */
    .lp-error {
      background: rgba(231,76,60,0.1);
      border: 1px solid rgba(231,76,60,0.3);
      border-radius: 4px;
      padding: 9px 12px;
      font-size: 12px;
      color: #ef4444;
      margin-bottom: 14px;
      display: none;
    }
    .lp-error.visible { display: block; }
    /* Bandeau d'information permanent (au-dessus du login) */
    .lp-info {
      display: flex; align-items: flex-start; gap: 8px;
      background: rgba(56,139,253,0.08); border: 1px solid rgba(56,139,253,0.25);
      border-radius: 6px; padding: 9px 12px; margin-bottom: 14px;
      font-size: 12px; line-height: 1.5; color: #9fb6d6;
    }
    .lp-info-ic { color: #58a6ff; font-weight: 700; flex-shrink: 0; }
    .lp-info a { color: #58a6ff; text-decoration: none; font-weight: 600; }
    .lp-info a:hover { text-decoration: underline; }
    .lp-renew-btn {
      display: inline-block; margin-top: 10px; padding: 7px 16px;
      background: var(--orange, #f7941d); color: #0a0a0c; font-weight: 700;
      font-size: 12px; border-radius: 6px; text-decoration: none;
    }
    .lp-renew-btn:hover { filter: brightness(1.08); }
    /* Message de succès (mot de passe oublié) — vert, distinct de l'erreur rouge */
    .lp-error.lp-msg-success {
      color: #22c55e;
      background: rgba(34,197,94,0.10);
      border-color: rgba(34,197,94,0.30);
    }

    /* Submit button */
    .lp-btn {
      width: 100%;
      height: 46px;
      background: transparent;
      color: var(--orange);
      border: 1.5px solid var(--orange);
      border-radius: 5px;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.15s, color 0.15s, transform 0.1s;
      margin-bottom: 14px;
    }
    .lp-btn:hover  { background: rgba(247,148,29,0.08); }
    .lp-btn:active { transform: scale(0.985); }
    .lp-btn:disabled { opacity: 0.4; cursor: default; }

    /* Contact link */
    /* Boutons de téléchargement de l'app bureau (clone PMT : icône + Download for / OS) */
    .lp-dl-row { display: flex; gap: 12px; margin-top: 22px; }
    .lp-dl-btn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 11px 14px; background: var(--bg2); border: 1px solid #26262c; border-radius: 6px;
      text-decoration: none; cursor: pointer; transition: border-color .15s;
    }
    .lp-dl-btn:hover { border-color: rgba(247,148,29,0.5); }
    .lp-dl-btn svg { width: 16px; height: 16px; color: #b9bcc4; flex: 0 0 auto; }
    .lp-dl-k { display: block; font-size: 10.5px; color: #8a8a93; line-height: 1.2; }
    .lp-dl-v { display: block; font-size: 13px; color: #e8e8ea; font-weight: 600; line-height: 1.25; }

    .lp-contact {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
      margin-bottom: 24px;
    }
    .lp-contact a {
      color: var(--orange);
      text-decoration: none;
    }
    .lp-contact a:hover { text-decoration: underline; }

    /* Divider */
    .lp-divider {
      height: 1px;
      background: #1e1e1e;
      margin-bottom: 20px;
    }

    /* Language selector */
    .lp-lang-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .lp-lang-label {
      font-size: 11px;
      color: var(--text2);
      flex-shrink: 0;
    }
    .lp-lang-select { display: none; }   /* natif masqué, remplacé par le dropdown custom DTP */
    /* ── Dropdown custom DTP (réutilisable : panneau sombre arrondi, ✓ orange sur l'item sélectionné) ── */
    .dtpsel { position: relative; display: inline-block; font-family: var(--font-ui); }
    .dtpsel-btn { display: flex; align-items: center; gap: 8px; background: #18181c; border: 1px solid #2a2a31; border-radius: 8px; padding: 7px 32px 7px 11px; font-size: 12.5px; color: #e6e8ec; cursor: pointer; outline: none; position: relative; min-width: 128px; transition: border-color .15s; }
    .dtpsel-btn:hover { border-color: #3a3a44; }
    .dtpsel.open .dtpsel-btn { border-color: var(--orange); }
    .dtpsel-lbl { display: inline-flex; align-items: center; gap: 8px; }
    .dtpsel-caret { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); transition: transform .2s; color: #8a8a92; pointer-events: none; line-height: 0; }
    .dtpsel.open .dtpsel-caret { transform: translateY(-50%) rotate(180deg); }
    .dtpsel-panel { position: absolute; top: calc(100% + 6px); left: 0; min-width: 100%; background: #18181c; border: 1px solid #2a2a31; border-radius: 8px; padding: 5px; box-shadow: 0 18px 44px -14px rgba(0,0,0,.75); z-index: 1000; display: none; max-height: 280px; overflow-y: auto; }
    .dtpsel.open .dtpsel-panel { display: block; }
    .dtpsel-item { display: flex; align-items: center; gap: 9px; padding: 8px 28px 8px 10px; border-radius: 6px; font-size: 12.5px; color: #c8cdd6; cursor: pointer; white-space: nowrap; position: relative; transition: background .12s; }
    .dtpsel-item:hover { background: #26262c; color: #fff; }
    .dtpsel-item.sel { background: rgba(247,148,29,.10); color: #fff; }
    .dtpsel-item.sel::after { content: "✓"; position: absolute; right: 10px; color: var(--orange); font-weight: 700; font-size: 12px; }
    .dtpsel-flag { width: 21px; height: 14px; border-radius: 2px; overflow: hidden; box-shadow: 0 0 0 1px rgba(255,255,255,.14); flex-shrink: 0; display: inline-flex; }
    .dtpsel-flag svg { width: 100%; height: 100%; display: block; }

    /* Download buttons */
    .lp-dl-row {
      display: flex;
      gap: 8px;
    }
    .lp-dl-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 10px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--text2);
      font-size: 11px;
      font-family: var(--font-ui);
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .lp-dl-btn:hover {
      color: var(--text);
      border-color: #3a3a3a;
      background: #1e1e1e;
    }

    /* Loading spinner */
    .lp-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: lp-spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes lp-spin { to { transform: rotate(360deg); } }

    /* ── Responsive: stack on narrow screens ── */
    @media (max-width: 900px) {
      html, body { overflow: auto; }
      .lp-layout { flex-direction: column; height: auto; overflow: visible; }
      .lp-left   { flex: none; height: 38vh; min-height: 220px; border-right: none; }
      .lp-right  { flex: none; padding: 36px 28px; }
      .lp-left-card { bottom: 8%; }
      .lp-title  { font-size: 32px; margin-bottom: 24px; }
    }
    @media (max-width: 480px) {
      .lp-left { height: 28vh; }
      .lp-right { padding: 28px 20px; }
      .lp-title { font-size: 26px; }
      .lp-dl-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="lp-layout">

  <!-- ════════ LEFT PANEL ════════ -->
  <div class="lp-left">
    <!-- Scrolling columns — populated by JS -->
    <div class="lp-mosaic" id="lp-mosaic"></div>
    <div class="lp-fade-top"></div>
    <div class="lp-fade-bottom"></div>
    <!-- Tagline card -->
    <div class="lp-left-card">
      <div class="lp-tagline-1">
        <strong>Boostez</strong> votre trading avec
      </div>
      <div class="lp-tagline-2">Des données qui bougent les graphiques !</div>
    </div>
  </div>

  <!-- ════════ RIGHT PANEL ════════ -->
  <div class="lp-right">

    <div class="lp-title">DataTradingPro</div>

    <div class="lp-error" id="lp-error"></div>

    <form id="lp-form" autocomplete="on">

      <!-- Email -->
      <div class="lp-form-group">
        <label class="lp-label" for="lp-email">Adresse e-mail :</label>
        <div class="lp-input-wrap">
          <input class="lp-input" type="email" id="lp-email" name="email"
                 placeholder="votre@email.com" autocomplete="email" required />
        </div>
      </div>

      <!-- Password -->
      <div class="lp-form-group">
        <label class="lp-label" for="lp-password">Mot de passe :</label>
        <div class="lp-input-wrap">
          <input class="lp-input" type="password" id="lp-password" name="password"
                 placeholder="••••••••" autocomplete="current-password" required />
          <span class="lp-input-icon lp-input-icon--eye" id="lp-eye" onclick="lpTogglePw()" title="Afficher/masquer">👁</span>
        </div>
      </div>

      <!-- Remember + forgot -->
      <div class="lp-row-remember">
        <label class="lp-checkbox-label">
          <input type="checkbox" id="lp-remember" name="remember" />
          Rester connecté
        </label>
        <a class="lp-forgot" href="#" onclick="lpForgot(event)">Mot de passe oublié ?</a>
      </div>

      <!-- Submit -->
      <button type="submit" class="lp-btn" id="lp-btn">Se connecter</button>

    </form>

    <!-- Application bureau (clone PMT) : 2 boutons de téléchargement Windows / macOS -->
    <div class="lp-dl-row">
      <a class="lp-dl-btn" href="/downloads/DataTradingPro-Setup.exe" download>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 15V3"></path><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="m7 10 5 5 5-5"></path></svg>
        <span class="lp-dl-txt"><span class="lp-dl-k">Download for</span><span class="lp-dl-v">Windows</span></span>
      </a>
      <a class="lp-dl-btn" href="/downloads/DataTradingPro-macOS.zip" download>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 15V3"></path><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="m7 10 5 5 5-5"></path></svg>
        <span class="lp-dl-txt"><span class="lp-dl-k">Download for</span><span class="lp-dl-v">MacOS</span></span>
      </a>
    </div>

    <!-- Contact -->
    <div class="lp-contact">
      Questions ?&nbsp;<a href="mailto:contact@datatradingpro.com">Nous contacter</a>
    </div>

    <div class="lp-divider"></div>

    <!-- Language -->
    <div class="lp-lang-row">
      <span class="lp-lang-label">Langue :</span>
      <select class="lp-lang-select" id="lp-lang">
        <option value="fr" selected>Français</option>
        <option value="en">English</option>
      </select>
    </div>


  </div><!-- /.lp-right -->

</div><!-- /.lp-layout -->

<script>

      ['/css/login-images/col4/195x130-20%20(2).webp','/css/login-images/col4/195x130-23.jpg','/css/login-images/col4/195x130-25.webp','/css/login-images/col4/195x130-26%20(2).webp','/css/login-images/col4/195x130-27%20(2).webp','/css/login-images/col4/195x130-34.webp','/css/login-images/col4/195x130-47%20(2).webp','/css/login-images/col4/195x130-47.webp','/css/login-images/col4/195x130-5.jpg','/css/login-images/col4/195x130-53%20(2).webp','/css/login-images/col4/195x130-54%20(2).webp','/css/login-images/col4/195x130-63.webp','/css/login-images/col4/195x130-7.jpg','/css/login-images/col4/195x130-79.webp','/css/login-images/col4/195x130-80%20(2).webp','/css/login-images/col4/195x130-89%20(2).webp'],
      ['/css/login-images/col5/195x130-21%20(2).webp','/css/login-images/col5/195x130-24%20(2).webp','/css/login-images/col5/195x130-26.jpg','/css/login-images/col5/195x130-32.webp','/css/login-images/col5/195x130-38.webp','/css/login-images/col5/195x130-4.jpg','/css/login-images/col5/195x130-47.jpg','/css/login-images/col5/195x130-48.webp','/css/login-images/col5/195x130-50.webp','/css/login-images/col5/195x130-52.jpg','/css/login-images/col5/195x130-57%20(2).webp','/css/login-images/col5/195x130-82.webp','/css/login-images/col5/195x130-83%20(2).webp','/css/login-images/col5/195x130-87%20(2).webp','/css/login-images/col5/195x130-97.webp','/css/login-images/col5/195x130.jpg'],
    ];

    const COL_PARAMS = [
      { dur: 121, delay: -22.8 },
      { dur: 120, delay: -43.8 },
      { dur: 189, delay: -36.8 },
      { dur: 208, delay: -44.8 },
      { dur: 227, delay: -27.4 }
    ];
    const ANGLES = [-10,4,-2,-8,6,0,-6,8,2,-4,-10,4,-2,-8,6,0];

    function buildCol(ci, srcs) {
      const col = document.createElement('div');
      col.className = 'lp-col';
      const inner = document.createElement('div');
      inner.className = 'lp-col-inner';
      const p = COL_PARAMS[ci];
      inner.style.animation = `scroll-up ${p.dur}s linear ${p.delay}s infinite`;
      [...srcs, ...srcs].forEach((src, i) => {
        const tile = document.createElement('div');
        tile.className = 'lp-tile';
        const ti = document.createElement('div');
        ti.className = 'lp-tile-inner';
        ti.style.transform = `rotateY(${ANGLES[i % ANGLES.length]}deg)`;
        const img = document.createElement('img');
        img.src = src;
        img.alt = ''; img.loading = 'eager'; img.draggable = false;
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;object-position:center;display:block';
        const ov = document.createElement('div');
        ov.className = 'lp-tile-overlay';
        ti.appendChild(img); ti.appendChild(ov);
        tile.appendChild(ti); inner.appendChild(tile);
      });
      col.appendChild(inner);
      return col;
    }

    mosaic.innerHTML = '';
    COL_IMGS.forEach((srcs, ci) => mosaic.appendChild(buildCol(ci, srcs)));
  })();

  /* ── Login form ── */
  const form   = document.getElementById('lp-form');
  const errEl  = document.getElementById('lp-error');
  const btn    = document.getElementById('lp-btn');

  // Toggle password visibility
  function lpTogglePw() {
    const inp = document.getElementById('lp-password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    errEl.classList.remove('visible');
    btn.disabled = true;
    btn.innerHTML = '<span class="lp-spinner"></span>Connexion…';

    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:    document.getElementById('lp-email').value,
          password: document.getElementById('lp-password').value,
        }),
      });
      const data = await r.json();
      if (data.ok) {
        window.location.href = '/';
      } else {
        errEl.classList.remove('lp-msg-success');
        const _msg = (data.error || 'Email ou mot de passe incorrect').replace(/</g, '&lt;');
        // Abonnement suspendu/expiré → on propose le bouton de renouvellement Whop
        errEl.innerHTML = data.renewUrl
          ? `${_msg}<a href="${data.renewUrl}" target="_blank" rel="noopener" class="lp-renew-btn">Renouveler mon abonnement</a>`
          : _msg;
        errEl.classList.add('visible');
      }
    } catch {
      errEl.classList.remove('lp-msg-success');
      errEl.textContent = 'Erreur de connexion — réessayez';
      errEl.classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Se connecter';
    }
  });

  // Mot de passe oublié → envoi d'un MDP temporaire par email
  async function lpForgot(e) {
    e.preventDefault();
    const emailEl = document.getElementById('lp-email');
    const email   = (emailEl.value || '').trim();
    const errEl   = document.getElementById('lp-error');
    // Pas de fenêtre native : on reste sur la page, design pro.
    if (!email) {
      errEl.classList.remove('lp-msg-success');
      errEl.textContent = 'Entrez d’abord votre adresse e-mail ci-dessus, puis recliquez sur « Mot de passe oublié ».';
      errEl.classList.add('visible');
      emailEl.focus();
      return;
    }
    // Confirmation IMMÉDIATE — on n'attend pas le serveur (l'envoi se fait en arrière-plan).
    errEl.classList.add('lp-msg-success');
    errEl.textContent = 'Si un compte existe pour cet email, un nouveau mot de passe vient d’être envoyé. Vérifiez votre boîte (et les spams).';
    errEl.classList.add('visible');
    fetch('/api/auth/forgot-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    }).catch(() => {});
  }

  // Drapeaux SVG inline (s'affichent partout, contrairement aux emojis drapeaux sur Windows)
  const _FLAGS = {
    fr: '<svg viewBox="0 0 3 2"><rect width="3" height="2" fill="#fff"/><rect width="1" height="2" fill="#002654"/><rect x="2" width="1" height="2" fill="#ce1126"/></svg>',
    en: '<svg viewBox="0 0 60 30"><clipPath id="uk-t"><path d="M0,0 v30 h60 v-30 z"/></clipPath><clipPath id="uk-s"><path d="M30,15 h30 v15 z v15 h-30 z h-30 v-15 z v-15 h30 z"/></clipPath><g clip-path="url(#uk-t)"><rect width="60" height="30" fill="#012169"/><path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L60,30 M60,0 L0,30" clip-path="url(#uk-s)" stroke="#C8102E" stroke-width="4"/><path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10"/><path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6"/></g></svg>',
  };
  // Composant dropdown custom DTP, réutilisable : enrichit n'importe quel <select> en menu stylé.
  function enhanceSelect(sel, flags) {
    flags = flags || {};
    if (!sel || sel.dataset.enhanced) return; sel.dataset.enhanced = '1';
    const fSpan = v => flags[v] ? '<span class="dtpsel-flag">' + flags[v] + '</span>' : '';
    const dd = document.createElement('div'); dd.className = 'dtpsel';
    const btn = document.createElement('div'); btn.className = 'dtpsel-btn'; btn.tabIndex = 0; btn.setAttribute('role', 'button');
    const lbl = document.createElement('span'); lbl.className = 'dtpsel-lbl';
    const caret = document.createElement('span'); caret.className = 'dtpsel-caret';
    caret.innerHTML = '<svg width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    btn.appendChild(lbl); btn.appendChild(caret);
    const panel = document.createElement('div'); panel.className = 'dtpsel-panel';
    const renderBtn = () => { const o = sel.options[sel.selectedIndex] || sel.options[0]; lbl.innerHTML = fSpan(o.value) + '<span>' + o.text + '</span>'; };
    Array.from(sel.options).forEach(o => {
      const it = document.createElement('div'); it.className = 'dtpsel-item' + (o.selected ? ' sel' : '');
      it.innerHTML = fSpan(o.value) + '<span>' + o.text + '</span>';
      it.addEventListener('click', () => {
        sel.value = o.value;
        panel.querySelectorAll('.dtpsel-item').forEach(x => x.classList.remove('sel'));
        it.classList.add('sel'); renderBtn(); dd.classList.remove('open');
        sel.dispatchEvent(new Event('change', { bubbles: true }));
      });
      panel.appendChild(it);
    });
    btn.addEventListener('click', e => { e.stopPropagation(); dd.classList.toggle('open'); });
    btn.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); dd.classList.toggle('open'); } else if (e.key === 'Escape') dd.classList.remove('open'); });
    document.addEventListener('click', e => { if (!dd.contains(e.target)) dd.classList.remove('open'); });
    dd.appendChild(btn); dd.appendChild(panel);
    sel.parentNode.insertBefore(dd, sel.nextSibling);
    renderBtn();
    return dd;
  }
  const _langSelect = document.getElementById('lp-lang');
  enhanceSelect(_langSelect, _FLAGS);

  // Autofocus email
  document.getElementById('lp-email').focus();
</script>
